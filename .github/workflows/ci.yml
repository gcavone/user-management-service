name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ---- Unit Tests ----
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports
          path: target/surefire-reports/

  # ---- Integration Tests ----
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run integration tests
        run: mvn verify -DskipTests=false
        # Testcontainers automatically uses the Docker socket available on the runner.
        # On GitHub Actions ubuntu-latest, Docker is pre-installed and the socket
        # is available at /var/run/docker.sock without any additional configuration.

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: target/failsafe-reports/

  # ---- Docker Build ----
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false   # Set to true and add registry credentials for production
          tags: |
            user-management-service:latest
            user-management-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max