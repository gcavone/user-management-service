# Cross-platform Docker socket configuration for Testcontainers.
# Testcontainers will automatically detect the correct socket based on the OS:
# - Linux: /var/run/docker.sock
# - macOS (Docker Desktop): ~/Library/Containers/com.docker.docker/Data/docker-cli.sock
# - Windows (Docker Desktop): npipe:////./pipe/docker_engine
docker.client.strategy=org.testcontainers.dockerclient.NpipeSocketClientProviderStrategy,\
  org.testcontainers.dockerclient.UnixSocketClientProviderStrategy,\
  org.testcontainers.dockerclient.DockerDesktopClientProviderStrategy
ryuk.disabled=true
